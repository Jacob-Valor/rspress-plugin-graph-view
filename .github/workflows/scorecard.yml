name: Scorecard Supply Chain Security

on:
  # Run on schedule — Scorecard requires this for public result publishing
  schedule:
    - cron: "30 1 * * 6" # Every Saturday at 01:30 UTC
  # Run on pushes to the default branch
  push:
    branches: [main]
  # Allow manual runs
  workflow_dispatch:

# Restrict default token permissions to read-only
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to GitHub code scanning
      security-events: write
      # Required to publish results and required by ossf/scorecard-action
      id-token: write
      # Required for checking out the repository
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF public dashboard (requires GITHUB_TOKEN)
          publish_results: true

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload Scorecard results to GitHub code scanning
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: results.sarif
