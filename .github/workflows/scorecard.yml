name: Scorecard Supply Chain Security

on:
  # Run on schedule — Scorecard requires this for public result publishing
  schedule:
    - cron: "30 1 * * 6" # Every Saturday at 01:30 UTC
  # Run on pushes to the default branch
  push:
    branches: [main]
  # Allow manual runs
  workflow_dispatch:

# Restrict default token permissions to read-only
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to GitHub code scanning
      security-events: write
      # Required to publish results and required by ossf/scorecard-action
      id-token: write
      # Required for checking out the repository
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75b98e9b6a # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF public dashboard (requires GITHUB_TOKEN)
          publish_results: true

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload Scorecard results to GitHub code scanning
        uses: github/codeql-action/upload-sarif@b56d1d8f9277d541d3e46a5c0e2cbedee3b9dae0 # v3.29.0
        with:
          sarif_file: results.sarif
